name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      # Core suite only — the oracle (PySINDy) tests are intentionally excluded so CI
      # never depends on the reference implementation.
      - name: Test
        run: uv run pytest -m "not oracle" --cov --cov-report=term-missing
